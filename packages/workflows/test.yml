name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
        working-directory: packages/worker
      - run: npx tsc --noEmit
        working-directory: packages/worker
      - run: npx vitest run --coverage
        working-directory: packages/worker
